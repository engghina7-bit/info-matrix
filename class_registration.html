    <style>
        :root {
            /* الهوية الليلية الفخمة */
            --navy: #1a2235; --navy-light: #242f48; --input-bg: #121826;
            --orange: #ff7e00; --gold: #ffc107; --success: #10b981; --danger: #ef4444;
            --text-main: #f8fafc; --text-muted: #94a3b8; --border-glass: rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: radial-gradient(circle at top right, rgba(255,126,0,0.05), transparent), var(--navy);
            color: var(--text-main); margin: 0; padding: 100px 20px 20px 20px; 
            display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; min-height: 100vh;
        }

        /* ---------------- البار العلوي ---------------- */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 80px; 
            background: rgba(26, 34, 53, 0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 126, 0, 0.15); display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; z-index: 1001; box-shadow: 0 4px 30px rgba(0,0,0,0.2);
        }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .brand img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--orange); object-fit: cover; box-shadow: 0 0 15px rgba(255,126,0,0.3);}
        .brand span { font-size: 1.8rem; font-weight: 900; color: white; letter-spacing: -1px; }
        .brand span i { color: var(--orange); font-style: normal; }
        .top-actions a { color: var(--text-muted); text-decoration: none; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px;}
        .top-actions a:hover { color: white; transform: translateX(-5px); }

        /* ---------------- شريط اختيار المواد ---------------- */
        .course-selector-container { 
            width: 100%; background: var(--navy-light); padding: 25px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 1px solid var(--border-glass); 
            border-top: 4px solid var(--gold); display: flex; flex-direction: column; gap: 15px; 
        }

        .input-group { display: flex; gap: 15px; align-items: center; flex-wrap: wrap;}
        select { 
            flex: 1; min-width: 250px; padding: 14px; border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; font-family: 'Cairo'; font-size: 1rem; font-weight: bold; 
            color: white; background-color: var(--input-bg); outline: none; transition: 0.3s;
        }
        select:focus { border-color: var(--orange); box-shadow: 0 0 0 4px rgba(255,126,0,0.1); }

        .selected-courses-tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .course-tag { 
            background: rgba(255, 126, 0, 0.1); color: white; padding: 8px 15px; border-radius: 50px; 
            font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; 
            border: 1px solid rgba(255,126,0,0.3); box-shadow: 0 5px 15px rgba(255,126,0,0.1);
        }
        .course-tag i { cursor: pointer; color: #ff6b6b; transition: 0.2s;}
        .course-tag i:hover { transform: scale(1.2); color: #ef4444; }

        /* ---------------- حاويات الأقسام ---------------- */
        .section-container { 
            background: var(--navy-light); border-radius: 20px; padding: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); flex: 1; min-width: 320px; 
            border: 1px solid var(--border-glass); border-top: 4px solid #3b82f6; 
            height: calc(100vh - 260px); overflow-y: auto; position: relative;
        }
        
        .section-container::-webkit-scrollbar { width: 8px; }
        .section-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px;}
        .section-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px;}
        .section-container::-webkit-scrollbar-thumb:hover { background: var(--orange); }

        .section-header { 
            font-size: 1.2rem; font-weight: 900; color: white; margin-bottom: 20px; 
            padding-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;
        }

        /* كروت الشعب المتاحة */
        .class-card { border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; margin-bottom: 20px; background: rgba(0,0,0,0.15); }
        .class-title { font-weight: 900; font-size: 1.1rem; color: var(--orange); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;}
        .time-slot { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--input-bg); padding: 12px 15px; border-radius: 12px; margin-top: 10px; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; flex-wrap: wrap; gap: 10px;
        }
        .time-slot:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2);}
        .class-prof { font-size: 0.95rem; color: white; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;}
        .class-prof i { color: var(--gold); }
        .class-time-info { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;}
        .class-section-badge { background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 6px; color: white; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 4px; border: 1px solid rgba(255,255,255,0.05);}

        /* الأزرار */
        .btn-add { 
            background: linear-gradient(135deg, var(--orange), #e65c00); color: white; border: none; 
            padding: 10px 20px; border-radius: 10px; cursor: pointer; font-family: 'Cairo'; 
            font-weight: bold; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,126,0,0.2);
        }
        .btn-add:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,126,0,0.4); }
        .btn-remove { background: rgba(239, 68, 68, 0.15); color: #ff6b6b; border: 1px solid rgba(239, 68, 68, 0.3); box-shadow: none; padding: 10px 15px;}
        .btn-remove:hover { background: #ef4444; color: white; }

        /* الجدول المحدد */
        .schedule-item { 
            display: flex; align-items: center; justify-content: space-between; 
            background: rgba(16, 185, 129, 0.08); border-right: 4px solid var(--success); 
            padding: 15px; border-radius: 12px; margin-bottom: 12px; 
            border: 1px solid rgba(16, 185, 129, 0.15); transition: 0.3s;
            position: relative; z-index: 2; /* ليكون فوق العلامة المائية */
        }
        .schedule-item:hover { transform: translateX(-5px); box-shadow: 0 5px 15px rgba(16,185,129,0.1);}
        .schedule-info h4 { margin: 0 0 5px 0; color: white; font-weight: 800;}
        .schedule-info p { margin: 0; font-size: 0.85rem; color: var(--text-muted); font-weight: 600; line-height: 1.6;}

        /* اللمبة للتحذير */
        .conflict-warning { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(200px); 
            background: var(--navy-light); border: 2px solid rgba(239, 68, 68, 0.5); padding: 15px 25px; 
            border-radius: 20px; display: flex; align-items: center; gap: 15px; 
            box-shadow: 0 15px 40px rgba(239, 68, 68, 0.2), 0 0 20px rgba(0,0,0,0.5); 
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000; 
        }
        .conflict-warning.show { transform: translateX(-50%) translateY(0); }
        .conflict-warning img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--danger); animation: pulseRed 2s infinite; object-fit: cover;}
        .conflict-text { color: white; font-weight: 800; font-size: 1rem; line-height: 1.5;}
        .conflict-text span { color: #ff6b6b; }
        
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* ---------------- العلامة المائية (تظهر فقط عند التصوير) ---------------- */
        .watermark {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            display: none; 
            flex-direction: column;
            align-items: center;
            opacity: 0.06; 
            pointer-events: none;
            z-index: 1;
        }
        .watermark img { width: 160px; height: 160px; border-radius: 50%; border: 5px solid var(--orange); margin-bottom: 10px; object-fit: cover;}
        .watermark h1 { color: white; font-size: 3.5rem; margin: 0; font-weight: 900; letter-spacing: 2px; }

        .export-mode { background: var(--navy-light) !important; padding: 30px !important; }
        .export-mode .watermark { display: flex; }
        .export-mode .btn-remove { display: none !important; }
        .export-mode .capture-hide { display: none !important; }

        @media (max-width: 768px) { body { padding-top: 100px; } .section-container { height: 400px; } }

        // تعبئة البيانات لكل شعبة بنقاط واسم المادة من coursesDB
        dbClasses.forEach(cls => {
            const c = coursesDB[cls.courseId];
            if(c) {
                cls.courseName = c.name;
                cls.credits = c.credits;
            } else {
                cls.courseName = cls.courseId; 
                cls.credits = 5; 
            }
        });

        let selectedCourseIds = []; 
        let mySchedule = []; 

        function initDropdown() {
            const dropdown = document.getElementById('courseDropdown');
            dropdown.innerHTML = '<option value="">-- اختر مادة لتظهر شعبها المتاحة --</option>';
            const uniqueCourseIds = [...new Set(dbClasses.map(item => item.courseId))];
            
            uniqueCourseIds.forEach(cId => {
                const cName = coursesDB[cId] ? coursesDB[cId].name : cId;
                dropdown.innerHTML += `<option value="${cId}">${cName} (${cId})</option>`;
            });
        }

        function addCourseToFilter() {
            const dropdown = document.getElementById('courseDropdown');
            const courseId = dropdown.value;
            
            if(!courseId) return;
            if(selectedCourseIds.includes(courseId)) {
                showBulbWarning("عذراً! هذه المادة مضافة بالفعل في قائمة البحث لديك."); return;
            }

            selectedCourseIds.push(courseId);
            dropdown.value = ""; 
            updateUI();
        }

        function removeCourseFromFilter(courseId) {
            selectedCourseIds = selectedCourseIds.filter(id => id !== courseId);
            mySchedule = mySchedule.filter(cls => cls.courseId !== courseId);
            updateUI();
        }

        function timeToMinutes(timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            return hours * 60 + minutes;
        }

        function renderAvailable() {
            const container = document.getElementById('availableClassesList');
            const tagsContainer = document.getElementById('selectedCoursesTags');
            container.innerHTML = ''; tagsContainer.innerHTML = '';

            if(selectedCourseIds.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:40px 20px; font-weight:bold; line-height:1.8;"><i class="fas fa-inbox" style="font-size:3rem; opacity:0.2; margin-bottom:15px; display:block;"></i>الرجاء تحديد مادة من الأعلى لعرض الدكاترة والأوقات.</div>`;
                return;
            }

            selectedCourseIds.forEach(id => {
                const cName = coursesDB[id] ? coursesDB[id].name : id;
                tagsContainer.innerHTML += `
                    <div class="course-tag">
                        ${cName} 
                        <i class="fas fa-times-circle" onclick="removeCourseFromFilter('${id}')" title="إزالة"></i>
                    </div>`;
            });

            const filteredClasses = dbClasses.filter(cls => selectedCourseIds.includes(cls.courseId));
            
            if(filteredClasses.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#ff6b6b; padding:20px; font-weight:bold; background:rgba(239, 68, 68, 0.1); border-radius:12px;">عذراً، لا يوجد شعب متاحة لهذه المادة في الجدول الحالي!</div>`;
                return;
            }

            const grouped = filteredClasses.reduce((acc, cls) => {
                if(!acc[cls.courseId]) acc[cls.courseId] = [];
                acc[cls.courseId].push(cls); return acc;
            }, {});

            for (const [courseId, classes] of Object.entries(grouped)) {
                let html = `<div class="class-card"><div class="class-title"><i class="fas fa-book" style="color:var(--text-muted)"></i> ${classes[0].courseName}</div>`;
                classes.forEach(cls => {
                    const isEnrolled = mySchedule.some(s => s.id === cls.id);
                    html += `
                        <div class="time-slot" style="${isEnrolled ? 'opacity:0.5; pointer-events:none; border-color:var(--success); background:rgba(16, 185, 129, 0.05);' : ''}">
                            <div>
                                <div class="class-prof"><i class="fas fa-user-tie"></i> ${cls.prof}</div>
                                <div class="class-time-info">
                                    <i class="fas fa-clock" style="color:var(--orange)"></i> ${cls.day} | <span style="direction:ltr; display:inline-block;">${cls.start} - ${cls.end}</span>
                                    <span class="class-section-badge" style="margin-right:10px;"><i class="fas fa-door-open" style="color:var(--gold)"></i> الصف: ${cls.section}</span>
                                </div>
                            </div>
                            <button class="btn-add" onclick="enrollClass(${cls.id})" ${isEnrolled ? 'disabled style="background:var(--success); color:white; box-shadow:none;"' : ''}>
                                ${isEnrolled ? 'مضافة ✅' : 'تثبيت بالجدول <i class="fas fa-plus"></i>'}
                            </button>
                        </div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            }
        }

        function checkConflict(newClass) {
            const newStart = timeToMinutes(newClass.start);
            const newEnd = timeToMinutes(newClass.end);
            for (const existingClass of mySchedule) {
                if (existingClass.day === newClass.day) {
                    const existStart = timeToMinutes(existingClass.start);
                    const existEnd = timeToMinutes(existingClass.end);
                    if (newStart < existEnd && newEnd > existStart) return existingClass;
                }
            }
            return null;
        }

        function enrollClass(classId) {
            const newClass = dbClasses.find(c => c.id === classId);
            if(mySchedule.some(c => c.courseId === newClass.courseId)) {
                showBulbWarning(`مهلاً! لقد قمت بإضافة مادة <span>${newClass.courseName}</span> في شعبة أخرى مسبقاً.`); return;
            }
            const conflict = checkConflict(newClass);
            if (conflict) {
                showBulbWarning(`انتبه للوقت! ⏰<br> هذه الشعبة تتعارض مع محاضرة <span>${conflict.courseName}</span> يوم ${conflict.day}.`); return;
            }
            mySchedule.push(newClass); updateUI();
        }

        function removeScheduleItem(classId) {
            mySchedule = mySchedule.filter(c => c.id !== classId); updateUI();
        }

        function updateUI() {
            renderAvailable();
            const scheduleContainer = document.getElementById('myScheduleList');
            const creditCounter = document.getElementById('creditCounter');
            
            if (mySchedule.length === 0) {
                scheduleContainer.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:40px 20px; font-weight:bold; line-height:1.8;"><i class="fas fa-calendar-times" style="font-size:3rem; opacity:0.2; margin-bottom:15px; display:block;"></i>لم تقم بتثبيت أي شعبة في جدولك بعد.</div>`;
                creditCounter.innerText = `0 نقطة`; creditCounter.style.background = 'rgba(255,255,255,0.1)'; return;
            }

            const daysOrder = { 'الأحد':1, 'الإثنين':2, 'الثلاثاء':3, 'الأربعاء':4, 'الخميس':5, 'الجمعة':6, 'السبت':7 };
            mySchedule.sort((a, b) => daysOrder[a.day] - daysOrder[b.day]);

            let totalCredits = 0; scheduleContainer.innerHTML = '';
            
            mySchedule.forEach(cls => {
                totalCredits += cls.credits;
                scheduleContainer.innerHTML += `
                    <div class="schedule-item">
                        <div class="schedule-info">
                            <h4>${cls.courseName}</h4>
                            <p>
                                ${cls.day} | <span style="direction:ltr; display:inline-block;">${cls.start} - ${cls.end}</span> <br> 
                                <i class="fas fa-user-tie" style="font-size:0.8rem; margin-top:5px; color:var(--gold);"></i> ${cls.prof} | 
                                <i class="fas fa-door-open" style="font-size:0.8rem; margin-top:5px; color:var(--orange);"></i> الصف: <strong style="color:white;">${cls.section}</strong>
                            </p>
                        </div>
                        <button class="btn-add btn-remove" onclick="removeScheduleItem(${cls.id})" title="حذف من المسودة"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
            creditCounter.innerText = `${totalCredits} نقطة مسجلة`;
            creditCounter.style.background = totalCredits >= 16 ? 'rgba(16, 185, 129, 0.2)' : 'rgba(255, 126, 0, 0.2)';
            creditCounter.style.color = totalCredits >= 16 ? 'var(--success)' : 'var(--orange)';
        }

        let warningTimeout;
        function showBulbWarning(messageHtml) {
            const warningBox = document.getElementById('conflictWarning');
            const textContainer = document.getElementById('conflictText');
            textContainer.innerHTML = messageHtml; warningBox.classList.add('show');
            clearTimeout(warningTimeout);
            warningTimeout = setTimeout(() => { warningBox.classList.remove('show'); }, 6000);
        }

        // ---------------- دالة تصوير الشاشة (html2canvas) ----------------
        async function downloadScheduleImage() {
            if (mySchedule.length === 0) {
                showBulbWarning("لا يوجد مواد في الجدول لتحميلها! 📝");
                return;
            }

            const container = document.getElementById('captureContainer');
            const origOverflow = container.style.overflowY;
            const origHeight = container.style.height;

            // تحضير الـ DOM للتصوير (إظهار العلامة المائية وإخفاء سلة المهملات وإظهار كامل الارتفاع)
            container.classList.add('export-mode');
            container.style.overflowY = 'visible'; 
            container.style.height = 'auto';

            const btn = document.querySelector('.capture-hide');
            const oldText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';

            try {
                const canvas = await html2canvas(container, {
                    backgroundColor: '#242f48', // لون الخلفية (navy-light)
                    scale: 2, // دقة مضاعفة (High Resolution)
                    useCORS: true // السماح برسم الصور الخارجية (مثل شعار اللمبة)
                });

                // إنشاء رابط التحميل الوهمي
                const link = document.createElement('a');
                link.download = 'جدول_موادي_infoMatrix.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                showBulbWarning("تم حفظ صورة الجدول بنجاح! 🎉");
            } catch (e) {
                console.error("Error exporting image", e);
                showBulbWarning("حدث خطأ أثناء تصدير الصورة.");
            } finally {
                // إعادة الواجهة لشكلها الطبيعي
                container.classList.remove('export-mode');
                container.style.overflowY = origOverflow;
                container.style.height = origHeight;
                btn.innerHTML = oldText;
            }
        }

        window.onload = () => {
            initDropdown();
