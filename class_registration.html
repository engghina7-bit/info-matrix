    <style>
        :root {
            --navy: #1a2235; --navy-light: #242f48; --input-bg: #121826;
            --orange: #ff7e00; --gold: #ffc107; --success: #10b981; --danger: #ef4444;
            --text-main: #f8fafc; --text-muted: #94a3b8; --border-glass: rgba(255, 255, 255, 0.08);
        }
        
        body { font-family: 'Cairo', sans-serif; background: var(--navy); margin: 0; color: var(--text-main); min-height: 100vh; overflow-x: hidden;}
        
        /* البار العلوي */
        .top-nav { background: rgba(26, 34, 53, 0.95); backdrop-filter: blur(12px); height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; border-bottom: 1px solid rgba(255, 126, 0, 0.15); position: sticky; top:0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.2);}
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 1.5rem; text-decoration: none; color:white; letter-spacing: -1px;}
        .brand img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--orange); object-fit: cover;}
        .btn-top-back { background: rgba(255,255,255,0.05); color: white; padding: 8px 18px; border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; border: 1px solid var(--border-glass);}
        .btn-top-back:hover { background: rgba(255,126,0,0.1); border-color: var(--orange); color: var(--orange);}

        /* الهيكل الأساسي */
        .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 25px 5%; height: calc(100vh - 75px); box-sizing: border-box;}
        
        /* القسم الأيمن (التحكم) */
        .control-panel { background: var(--navy-light); border-radius: 20px; padding: 25px; border: 1px solid var(--border-glass); display: flex; flex-direction: column; gap: 20px; overflow-y: auto;}
        
        /* القائمة المنسدلة الاحترافية */
        .select-wrapper { position: relative; }
        .select-wrapper::after { content: '\f107'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--orange); pointer-events: none; }
        .course-select { width: 100%; padding: 14px 40px 14px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: var(--input-bg); color: white; font-family: 'Cairo'; font-size: 1rem; font-weight: bold; outline: none; transition: 0.3s; box-sizing: border-box; cursor: pointer; appearance: none;}
        .course-select:focus { border-color: var(--orange); box-shadow: 0 0 0 4px rgba(255,126,0,0.1); }
        .course-select option { background: var(--navy-light); color: white; }

        /* تفاصيل المادة واختيار الشعبة */
        .class-details-panel { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 20px; display: none; border: 1px solid rgba(255,255,255,0.05); animation: fadeIn 0.3s ease;}
        .class-details-panel h3 { margin: 0 0 15px 0; color: var(--orange); font-size: 1.2rem; }
        .section-card { background: var(--navy); border: 1px solid var(--border-glass); padding: 15px; border-radius: 10px; margin-bottom: 10px; transition: 0.2s; display: flex; flex-direction: column; gap: 8px;}
        .section-card:hover { border-color: var(--success); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.1);}
        .btn-add-class { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); padding: 8px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; width: 100%; transition: 0.3s;}
        .btn-add-class:hover:not(:disabled) { background: var(--success); color: white;}
        .btn-add-class:disabled { background: rgba(255,255,255,0.05); color: var(--text-muted); border-color: rgba(255,255,255,0.1); cursor: not-allowed; }

        /* القسم الأيسر (الجدول الأسبوعي) */
        .schedule-panel { background: var(--navy-light); border-radius: 20px; border: 1px solid var(--border-glass); display: flex; flex-direction: column; overflow: hidden; position: relative;}
        
        .schedule-header { padding: 20px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.1);}
        .schedule-header h2 { margin: 0; font-size: 1.4rem; display: flex; align-items: center; gap: 10px;}
        .btn-export { background: linear-gradient(135deg, var(--orange), #e65c00); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-family: 'Cairo'; font-weight: 900; font-size: 0.9rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; box-shadow: 0 5px 15px rgba(255,126,0,0.3);}
        .btn-export:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,126,0,0.4);}

        /* منطقة التصدير */
        .export-wrapper { flex: 1; overflow-y: auto; padding: 20px; background: var(--navy-light);}
        
        /* ترويسة خاصة تظهر فقط في الصورة */
        .export-watermark { display: none; text-align: center; margin-bottom: 20px; border-bottom: 2px dashed var(--orange); padding-bottom: 15px;}
        .export-watermark img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--orange); object-fit: cover;}
        .export-watermark h2 { margin: 10px 0 5px; color: white; font-size: 1.8rem; font-weight: 900;}
        .export-watermark p { margin: 0; color: var(--gold); font-weight: bold; font-size: 1.1rem;}

        /* جدول الأوقات الحديث */
        .timetable { width: 100%; border-collapse: separate; border-spacing: 5px; min-width: 700px;}
        .timetable th { background: rgba(0,0,0,0.3); color: var(--text-muted); padding: 15px; border-radius: 12px; font-weight: 900; text-align: center;}
        .timetable td { background: rgba(255,255,255,0.02); padding: 5px; border-radius: 12px; vertical-align: top; border: 1px solid transparent; min-height: 85px; transition: 0.3s; width: 12.5%;}
        .timetable td:hover { background: rgba(255,255,255,0.05); }

        .time-col { font-family: monospace; font-size: 1rem; color: var(--gold); font-weight: bold; text-align: center; vertical-align: middle !important; width: 80px !important; background: rgba(0,0,0,0.1) !important;}

        /* بطاقة المحاضرة داخل الجدول */
        .booked-class { background: rgba(255, 126, 0, 0.1); border: 1px solid rgba(255, 126, 0, 0.3); border-right: 4px solid var(--orange); padding: 10px; border-radius: 10px; margin-bottom: 5px; position: relative; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .booked-class h4 { margin: 0 0 5px 0; color: white; font-size: 0.85rem; font-weight: 900; line-height: 1.4;}
        .booked-class p { margin: 0; color: var(--text-muted); font-size: 0.75rem; font-weight: bold; display: flex; align-items: center; gap: 5px;}
        .btn-remove-class { position: absolute; top: 5px; left: 5px; color: var(--danger); background: transparent; border: none; cursor: pointer; font-size: 1rem; opacity: 0.5; transition: 0.2s;}
        .booked-class:hover .btn-remove-class { opacity: 1; transform: scale(1.1);}

        /* ملخص الساعات */
        .stats-bar { display: flex; gap: 20px; padding: 15px 25px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05); align-items: center;}
        .stat-item { display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--text-muted);}
        .stat-item span { color: var(--gold); font-size: 1.2rem; font-weight: 900;}

        /* اللمبة للتحذير (التعارض) */
        .conflict-warning { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(200px); background: var(--navy-light); border: 2px solid rgba(239, 68, 68, 0.5); padding: 15px 25px; border-radius: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 15px 40px rgba(239, 68, 68, 0.2), 0 0 20px rgba(0,0,0,0.5); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000; }
        .conflict-warning.show { transform: translateX(-50%) translateY(0); }
        .conflict-warning img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--danger); animation: pulseRed 2s infinite; object-fit: cover;}
        .conflict-text { color: white; font-weight: 800; font-size: 1rem; line-height: 1.5;}
        .conflict-text span { color: #ff6b6b; }
        
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);}}
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        @media (max-width: 992px) { .main-layout { grid-template-columns: 1fr; height: auto; } }
        
        /* 📸 كلاسات التصدير (سر الاحترافية للصورة الكاملة) */
        .capture-mode {

            height: auto !important;

        .capture-mode .timetable {

        }
        .capture-mode .export-watermark { display: block !important; }
        .capture-mode .btn-remove-class { display: none !important; } 
        .capture-mode .timetable td { border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>

        async function fetchAllData() {
            const dropdown = document.getElementById('courseSelectorDropdown');
            dropdown.innerHTML = '<option value="">-- جاري الاتصال بقاعدة البيانات... --</option>';
            
            try {
                let { data: serverClasses, error } = await supabaseClient.from('classes').select('*');
                if (error) alert("⚠️ تنبيه من السيرفر: " + error.message);
                
                let finalClassesMap = {};
                dbClasses.forEach(c => finalClassesMap[c.id] = c); 
                
                if(serverClasses && !error) {
                    serverClasses.forEach(sc => {
                        let sTime = sc.start_time ? String(sc.start_time).substring(0, 5) : "00:00";
                        let eTime = sc.end_time ? String(sc.end_time).substring(0, 5) : "00:00";
                        let cId = sc.course_id || "غير معروف";
                        let cName = coursesDB[cId] ? coursesDB[cId].name : cId;
                        finalClassesMap[sc.id] = { id: sc.id, courseId: String(cId), prof: sc.prof || "غير محدد", day: sc.day || "غير محدد", start: sTime, end: eTime, section: sc.section || "-", credits: sc.credits || 5, courseName: String(cName) };
                    });
                }
                
                allAvailableClasses = Object.values(finalClassesMap);
                
                let courseMap = new Map();
                allAvailableClasses.forEach(c => {
                    if(c.courseId && !courseMap.has(c.courseId)) {
                        courseMap.set(c.courseId, { id: c.courseId, name: c.courseName, credits: c.credits });
                    }
                });
                uniqueCourses = Array.from(courseMap.values());
                uniqueCourses.sort((a, b) => String(a.name).localeCompare(String(b.name), 'ar'));
                
                dropdown.innerHTML = '<option value="">-- اختر المادة من القائمة لتسجيلها --</option>';
                uniqueCourses.forEach(course => {
                    dropdown.innerHTML += `<option value="${course.id}">${course.name} (${course.id})</option>`;
                });
                
            } catch (err) {
                console.error(err); dropdown.innerHTML = '<option value="">-- حدث خطأ في جلب البيانات! --</option>';
            }
        }

        // ================= نظام التعارض القوي =================
        function checkConflict(newClass) {
            if (!newClass.start || !newClass.end) return null;
            
            const newStart = parseInt(newClass.start.split(':')[0]) * 60 + parseInt(newClass.start.split(':')[1]);
            const newEnd = parseInt(newClass.end.split(':')[0]) * 60 + parseInt(newClass.end.split(':')[1]);

            for (const existingClass of mySchedule) {
                if (existingClass.day === newClass.day) {
                    const existStart = parseInt(existingClass.start.split(':')[0]) * 60 + parseInt(existingClass.start.split(':')[1]);
                    const existEnd = parseInt(existingClass.end.split(':')[0]) * 60 + parseInt(existingClass.end.split(':')[1]);

                    if (newStart < existEnd && newEnd > existStart) {
                        return existingClass; 
                    }
                }
            }
            return null;
        }

        function addSectionToSchedule(cls, courseData) {
            const existingCourse = mySchedule.find(item => item.courseId === cls.courseId);
            if(existingCourse) {
                showBulbWarning(`مهلاً! لقد قمت بإضافة مادة <span>${courseData.name}</span> مسبقاً. احذفها أولاً لتغيير الشعبة.`);
                return;
            }

            const conflict = checkConflict(cls);
            if (conflict) {
                showBulbWarning(`انتبه للوقت! ⏰<br> هذه الشعبة تتعارض مع <span>${conflict.courseName}</span> يوم ${conflict.day}.`);
                return;
            }

            mySchedule.push({ ...cls, courseName: courseData.name, credits: courseData.credits });
            renderSchedule();

            document.getElementById('courseSelectorDropdown').value = '';
            document.getElementById('classDetailsPanel').style.display = 'none';
        }

        function removeClass(courseId) {
            mySchedule = mySchedule.filter(c => c.courseId !== courseId);
            renderSchedule();
        }

        function renderSchedule() {
            document.querySelectorAll('#scheduleTable tbody td:not(.time-col)').forEach(td => {
                td.innerHTML = ''; td.className = '';
            });

            let totalCredits = 0; let totalCourses = mySchedule.length;
            let cellsMap = {};

            mySchedule.forEach(cls => {
                totalCredits += parseInt(cls.credits || 0);
                const startHour = cls.start ? cls.start.substring(0, 5) : null;
                if(!startHour) return;

                const cellId = `cell-${cls.day}-${startHour}`;
                const td = document.getElementById(cellId);
                
                if(td) {
                    if(!cellsMap[cellId]) cellsMap[cellId] = [];
                    cellsMap[cellId].push(cls);
                }
            });

            for (let cellId in cellsMap) {
                const td = document.getElementById(cellId);
                const classesInCell = cellsMap[cellId];

                classesInCell.forEach(cls => {
                    const card = document.createElement('div');
                    card.className = `booked-class`;
                    card.innerHTML = `
                        <button class="btn-remove-class" onclick="removeClass('${cls.courseId}')"><i class="fas fa-times"></i></button>
                        <h4>${cls.courseName}</h4>
                        <p style="font-family:monospace; color:var(--gold); margin-bottom:3px;">شعبة ${cls.section || '-'}</p>
                        <p><i class="fas fa-user"></i> ${cls.prof}</p>
                    `;
                    td.appendChild(card);
                });
            }

            document.getElementById('totalCourses').innerText = totalCourses;
            document.getElementById('totalCredits').innerText = totalCredits;
        }

                    backgroundColor: '#1a2235', 
                    useCORS: true,
                    scrollY: -window.scrollY,
                    windowWidth: exportArea.scrollWidth,
                    windowHeight: exportArea.scrollHeight
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'جدولي_الجامعي_infoMatrix.png';
                    link.href = canvas.toDataURL("image/png");
                    link.click();

                    schedulePanel.classList.remove('capture-mode');
                    exportArea.classList.remove('capture-mode');
                    document.getElementById('scheduleHeaderBtns').style.display = 'flex';
                    document.getElementById('statsBarDisplay').style.display = 'flex';
                    btnCapture.innerHTML = originalBtnText;
                    btnCapture.disabled = false;
                }).catch(err => {
                    alert("حدث خطأ أثناء حفظ الصورة!");
                    schedulePanel.classList.remove('capture-mode');
                    exportArea.classList.remove('capture-mode');
                    document.getElementById('scheduleHeaderBtns').style.display = 'flex';
                    document.getElementById('statsBarDisplay').style.display = 'flex';
                    btnCapture.innerHTML = originalBtnText;
                    btnCapture.disabled = false;
                });
            }, 500);
        }

        let warningTimeout;
        function showBulbWarning(messageHtml) {
            const warningBox = document.getElementById('conflictWarning');
            const textContainer = document.getElementById('conflictText');
            textContainer.innerHTML = messageHtml; warningBox.classList.add('show');
            clearTimeout(warningTimeout);
            warningTimeout = setTimeout(() => { warningBox.classList.remove('show'); }, 6000);
        }
    </script>
</body>
</html>
