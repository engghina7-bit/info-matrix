<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - info</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --navy: #1a2235;
            --navy-light: #242f48;
            --input-bg: #121826;
            --orange: #ff7e00; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top right, rgba(255,126,0,0.05), transparent), var(--navy);
            margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; 
            padding: 20px; box-sizing: border-box; color: var(--text-main);
        }

        .login-wrapper {
            background: var(--navy-light); 
            border-radius: 24px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255, 126, 0, 0.15);
            display: flex; flex-direction: column; align-items: center;
            max-width: 400px; width: 100%; padding: 50px 40px 40px;
            position: relative;
            margin-top: 60px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bulb-container {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            animation: floatLogin 4s ease-in-out infinite;
            z-index: 10;
        }
        .bulb-container img {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            border: 4px solid rgba(255, 126, 0, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 30px rgba(255,126,0,0.4);
            background-color: var(--navy);
            display: block;
        }

        .form-header { text-align: center; margin-top: 20px; margin-bottom: 30px; width: 100%; }
        .form-header h2 { margin: 0 0 5px 0; color: white; font-size: 1.8rem; font-weight: 900; letter-spacing: -0.5px; }
        .form-header h2 span { color: var(--orange); }
        .form-header p { margin: 0; color: var(--text-muted); font-weight: 600; font-size: 0.95rem; }

        .login-form { width: 100%; }
        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: 700; font-size: 1rem; text-align: center;}
        .input-group i { position: absolute; right: 16px; top: 40px; color: var(--text-muted); font-size: 1.1rem; transition: 0.3s; }
        .input-group input { 
            width: 100%; padding: 14px 45px 14px 15px; 
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; 
            font-family: 'Cairo'; font-size: 1.1rem; font-weight: bold; 
            color: white; outline: none; transition: 0.3s; box-sizing: border-box; 
            background: var(--input-bg); text-align: right;
        }
        .input-group input::placeholder { color: #475569; font-weight: 600; font-size: 0.95rem;}
        .input-group input:focus { border-color: var(--orange); background: #1a2235; box-shadow: 0 0 0 4px rgba(255,126,0,0.1); }
        .input-group input:focus + i, .input-group input:not(:placeholder-shown) + i { color: var(--orange); }

        .btn-submit {
            background: linear-gradient(135deg, var(--orange), #e65c00); 
            color: white; border: none; width: 100%; padding: 15px; 
            border-radius: 12px; font-family: 'Cairo'; font-size: 1.2rem; 
            font-weight: 900; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 10px 25px rgba(255,126,0,0.3); 
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,126,0,0.4); }

        .alert-box { padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; font-weight: bold; display: none; text-align: center; }
        .alert-success { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }

        .back-home { position: absolute; top: 20px; left: 20px; color: var(--text-muted); text-decoration: none; font-size: 1.5rem; transition: 0.3s; }
        .back-home:hover { color: white; transform: scale(1.1); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes floatLogin {
            0% { transform: translate(-50%, 0px); }
            50% { transform: translate(-50%, -12px); }
            100% { transform: translate(-50%, 0px); }
        }

        @media (max-width: 480px) { 
            .login-wrapper { padding: 50px 20px 30px; margin-top: 50px;}
            .bulb-container { top: -50px; }
            .bulb-container img { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home" title="العودة للرئيسية"><i class="fas fa-home"></i></a>

    <div class="login-wrapper">
        
        <div class="bulb-container">
            <img src="img/photo_2_2026-03-18_22-23-47.jpg" alt="info bulb">
        </div>

        <div class="form-header">
            <h2>أهلاً بك في <span>info.</span></h2>
            <p>نُبسّط المعرفة، لنبني أثراً</p>
        </div>

        <div id="alertBox" class="alert-box"></div>

        <form id="loginForm" class="login-form">
            <div class="input-group">
                <label for="studentName">ما هو اسمك يا مهندس؟</label>
                <input type="text" id="studentName" placeholder="أدخل اسمك الأول هنا..." required autocomplete="off">
                <i class="fas fa-user-astronaut"></i>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span>دخول سريع</span>
                <i class="fas fa-rocket"></i>
            </button>
        </form>

    </div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('studentName').value.trim();
        const alertBox = document.getElementById('alertBox');
        const submitBtn = document.getElementById('submitBtn');

        if (!name) return;

        // تأثير تحميل وهمي للجمالية
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تجهيز المساحة...';
        submitBtn.disabled = true;

        setTimeout(() => {
            alertBox.textContent = `أهلاً بك يا ${name}! جاري توجيهك...`;
            alertBox.className = 'alert-box alert-success';
            alertBox.style.display = 'block';
            
            // حفظ الاسم بطريقة تقرأها الداشبورد بسلاسة
            localStorage.setItem('im_student_email', name + '@info.com'); 
            
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
        }, 600); // تأخير بسيط لجمالية الأنميشن
    });
</script>

</body>
</html>
