<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - فريق Info Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --navy: #0a192f; --navy-light: #112240; --orange: #ff7e00; --gold: #ffc107;
            --gray: #cbd5e1; --bg: #f0f4f8; --text-main: #0a192f;
        }

        body {
            font-family: 'Cairo', sans-serif; background-color: var(--bg); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh;
            -webkit-user-select: none; user-select: none;
        }

        /* البار العلوي */
        .top-bar {
            height: 70px; background-color: var(--navy); border-bottom: 3px solid var(--orange);
            display: flex; align-items: center; justify-content: center; padding: 0 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .bar-logo-container { display: flex; align-items: center; gap: 15px; }
        .bar-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--orange); object-fit: cover; }
        .bar-title { color: var(--gold); font-weight: 900; font-size: 1.5rem; margin: 0; letter-spacing: 1px;}

        /* القسم الرئيسي (Hero Section) */
        .hero-section {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 40px 20px; text-align: center; background: linear-gradient(180deg, rgba(10,25,47,0.05) 0%, rgba(240,244,248,1) 100%);
            animation: fadeIn 1s ease-out;
        }
        .hero-title { font-size: 2.5rem; color: var(--navy); font-weight: 900; margin-bottom: 10px; }
        .hero-subtitle { font-size: 1.1rem; color: #475569; max-width: 600px; line-height: 1.8; margin-bottom: 30px; font-weight: 600;}

        /* صندوق الإدخال */
        .login-box {
            background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%; max-width: 400px; border-top: 5px solid var(--orange);
        }
        .login-box h3 { margin-top: 0; color: var(--navy); font-weight: 800; font-size: 1.3rem; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--orange); font-size: 1.2rem;}
        
        input[type="text"] {
            width: 100%; padding: 15px 45px 15px 15px; border: 2px solid var(--gray); border-radius: 12px;
            font-family: 'Cairo'; font-size: 1.1rem; font-weight: bold; color: var(--navy); outline: none; transition: 0.3s; box-sizing: border-box;
        }
        input[type="text"]:focus { border-color: var(--orange); box-shadow: 0 0 10px rgba(255,126,0,0.2); }

        .btn-start {
            background: linear-gradient(135deg, var(--orange), #e65c00); color: white; border: none;
            width: 100%; padding: 15px; border-radius: 12px; font-family: 'Cairo'; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,126,0,0.3);
        }
        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255,126,0,0.4); }

        /* نافذة الترحيب (البرومبت) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10, 25, 47, 0.9);
            display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(5px); padding: 20px;
        }
        .modal {
            background: white; padding: 40px 30px; border-radius: 20px; width: 100%; max-width: 450px; 
            text-align: center; border-top: 6px solid var(--success); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal i { font-size: 3rem; color: var(--success); margin-bottom: 15px; }
        .welcome-text { font-size: 1.3rem; color: var(--navy); font-weight: 800; line-height: 1.6; margin-bottom: 25px;}
        .btn-continue {
            background: var(--navy); color: white; border: none; padding: 12px 30px; border-radius: 10px;
            font-family: 'Cairo'; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; width: 100%;
        }
        .btn-continue:hover { background: var(--orange); }

        /* الفوتر */
        .site-footer { text-align: center; padding: 20px; font-weight: bold; font-size: 0.9rem; color: var(--text-muted); background: white; border-top: 1px solid var(--gray); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        @media (max-width: 768px) {
            .hero-title { font-size: 2rem; }
            .hero-subtitle { font-size: 1rem; padding: 0 10px; }
        }
    </style>
</head>
<body>

<nav class="top-bar">
    <div class="bar-logo-container">
        <img src="logo.jpg" alt="Info Matrix Logo" class="bar-logo">
        <h2 class="bar-title">INFO MATRIX</h2>
    </div>
</nav>

<div class="hero-section">
    <h1 class="hero-title">أهلاً بك في بوابتك الأكاديمية 🎓</h1>
    <p class="hero-subtitle">
        الموقع الرسمي لفريق <b>Info Matrix</b> التطوعي.<br> خطط لمسيرتك، اعرف أسبقياتك، واحسب رصيدك بدقة وسهولة.
    </p>

    <div class="login-box">
        <h3>لنتعرف عليك أولاً 👋</h3>
        <div class="input-group">
            <i class="fas fa-user-graduate"></i>
            <input type="text" id="studentNameInput" placeholder="أدخل اسمك الكريم هنا..." autocomplete="off">
        </div>
        <button class="btn-start" onclick="startJourney()">دخول للمحاكي الأكاديمي <i class="fas fa-arrow-left"></i></button>
    </div>
</div>

<footer class="site-footer">
    © 2026 جميع الحقوق محفوظة - فريق Info Matrix التطوعي 🎓
</footer>

<div class="modal-overlay" id="welcomeModal">
    <div class="modal">
        <i class="fas fa-check-circle"></i>
        <div class="welcome-text" id="welcomeMessage"></div>
        <button class="btn-continue" onclick="goToSimulator()">متابعة <i class="fas fa-rocket"></i></button>
    </div>
</div>

<script>
    // التحقق مما إذا كان الطالب مسجلاً مسبقاً
    window.onload = function() {
        const savedName = localStorage.getItem('im_student_name');
        if (savedName) {
            document.getElementById('studentNameInput').value = savedName;
        }
    };

    function startJourney() {
        const nameInput = document.getElementById('studentNameInput').value.trim();
        
        if (nameInput === "") {
            alert("يا مهندس، الرجاء إدخال اسمك لنتمكن من الترحيب بك!");
            return;
        }

        // حفظ الاسم في الذاكرة الدائمة
        localStorage.setItem('im_student_name', nameInput);

        // تجهيز وعرض رسالة الترحيب
        const welcomeMsg = document.getElementById('welcomeMessage');
        welcomeMsg.innerHTML = `أهلاً بك يا مهندس/ة <br><span style="color: var(--orange); font-size: 1.6rem; display:inline-block; margin-top:5px;">${nameInput}</span><br><br><span style="font-size: 1rem; color:#475569;">نتمنى لك رحلة أكاديمية مليئة بالتفوق والنجاح مع فريق Info Matrix.</span>`;
        
        document.getElementById('welcomeModal').style.display = 'flex';
    }

    function goToSimulator() {
        // الانتقال لصفحة المحاكي
        window.location.href = 'simulator.html';
    }

    // السماح بالضغط على زر Enter للسرعة
    document.getElementById("studentNameInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            startJourney();
        }
    });

    // جدار الحماية البسيط
    document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
